name: Deploy Cloud Native App

on:
  push:
    branches:
      - main

env:
  IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/cloudnativeapp
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/cloudnativeapp:latest
  IMAGE_NAME_SHA: ${{ secrets.DOCKERHUB_USERNAME }}/cloudnativeapp:${{ github.sha }}
  IMAGE_TAG: latest
  CONTAINER_NAME: cloudnativeapp
  DEPLOY_PATH: /home/ec2-user/cloudnativeapp

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Dar permisos al wrapper
        run: chmod +x mvnw

      - name: Ejecutar pruebas
        run: ./mvnw clean test

      - name: Validar secrets requeridos
        run: |
          test -n "${{ secrets.DOCKERHUB_USERNAME }}" || { echo "::error::Falta el secret DOCKERHUB_USERNAME"; exit 1; }
          test -n "${{ secrets.DOCKERHUB_TOKEN }}" || { echo "::error::Falta el secret DOCKERHUB_TOKEN"; exit 1; }
          test -n "${{ secrets.EC2_HOST }}" || { echo "::error::Falta el secret EC2_HOST"; exit 1; }
          test -n "${{ secrets.EC2_SSH_KEY }}" || { echo "::error::Falta el secret EC2_SSH_KEY"; exit 1; }
          test -n "${{ secrets.USER_SERVER }}" || { echo "::error::Falta el secret USER_SERVER"; exit 1; }
          test -n "${{ secrets.DB_URL }}" || { echo "::error::Falta el secret DB_URL"; exit 1; }
          test -n "${{ secrets.DB_USERNAME }}" || { echo "::error::Falta el secret DB_USERNAME"; exit 1; }
          test -n "${{ secrets.DB_PASSWORD }}" || { echo "::error::Falta el secret DB_PASSWORD"; exit 1; }
          test -n "${{ secrets.SERVER_PORT }}" || { echo "::error::Falta el secret SERVER_PORT"; exit 1; }
          test -n "${{ secrets.AWS_REGION }}" || { echo "::error::Falta el secret AWS_REGION"; exit 1; }
          test -n "${{ secrets.AWS_ACCESS_KEY_ID }}" || { echo "::error::Falta el secret AWS_ACCESS_KEY_ID"; exit 1; }
          test -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" || { echo "::error::Falta el secret AWS_SECRET_ACCESS_KEY"; exit 1; }
          test -n "${{ secrets.AWS_S3_BUCKET_NAME }}" || { echo "::error::Falta el secret AWS_S3_BUCKET_NAME"; exit 1; }
          test -n "${{ secrets.AWS_SESSION_TOKEN }}" || { echo "::error::Falta el secret AWS_SESSION_TOKEN"; exit 1; }

      - name: Iniciar sesion en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir imagen Docker
        run: docker build -t $IMAGE_NAME -t $IMAGE_NAME_SHA .

      - name: Publicar imagenes en Docker Hub
        run: |
          docker push $IMAGE_NAME
          docker push $IMAGE_NAME_SHA

      - name: Desplegar en EC2 por SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USER_SERVER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"

            mkdir -p "$DEPLOY_PATH"
            if [ ! -d /mnt/efs ]; then
              echo "EFS no esta montado correctamente en /mnt/efs"
              exit 1
            fi
            mkdir -p /mnt/efs/guias
            cd "$DEPLOY_PATH"

            cat > docker-compose.ec2.yml <<'EOF'
            services:
              cloudnativeapp:
                image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
                container_name: ${CONTAINER_NAME:-cloudnativeapp}
                restart: unless-stopped
                ports:
                  - "8080:8080"
                environment:
                  DB_URL: ${DB_URL}
                  DB_USERNAME: ${DB_USERNAME}
                  DB_PASSWORD: ${DB_PASSWORD}
                  SERVER_PORT: ${SERVER_PORT:-8080}
                  AWS_REGION: ${AWS_REGION}
                  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
                  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
                  AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
                  AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
                  GUIAS_EFS_PATH: ${GUIAS_EFS_PATH:-/app/efs/guias}
                volumes:
                  - /home/ec2-user/wallets/Wallet_cloudnativeapp:/app/wallet:ro
                  - /mnt/efs:/app/efs
            EOF

            cat > .env <<'EOF'
            IMAGE_NAME=${{ env.IMAGE_REPOSITORY }}
            IMAGE_TAG=${{ env.IMAGE_TAG }}
            CONTAINER_NAME=${{ env.CONTAINER_NAME }}
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SERVER_PORT=${{ secrets.SERVER_PORT }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}
            AWS_S3_BUCKET_NAME=${{ secrets.AWS_S3_BUCKET_NAME }}
            GUIAS_EFS_PATH=/app/efs/guias
            EOF

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose -f docker-compose.ec2.yml pull
            docker compose -f docker-compose.ec2.yml down --remove-orphans || true
            docker rm -f ${CONTAINER_NAME:-cloudnativeapp} || true
            docker compose -f docker-compose.ec2.yml up -d --remove-orphans
